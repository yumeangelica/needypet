services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    # Runtime config and secrets (Mongo URI, JWT secret, mail, ALLOWED_ORIGINS).
    # Provide them in server/.env.production (git-ignored, not baked into the image).
    env_file:
      - ./server/.env.production
    environment:
      NODE_ENV: production
      PORT: 5002
    restart: unless-stopped
